spring:
  application:
    name: notes-api
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  data:
    web:
      pageable:
        max-page-size: 100
    redis:
      url: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
  flyway:
    enabled: true

server:
  shutdown: graceful
  forward-headers-strategy: framework
  servlet:
    context-path: /api/v1

jwt:
  secret: ${JWT_SECRET}
  expiration:
    in:
      minutes: ${JWT_EXPIRATION_IN_MINUTES:10}
  refresh:
    expiration:
      in:
        days: ${JWT_REFRESH_EXPIRATION_IN_DAYS:7}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

springdoc:
  swagger-ui:
    enabled: false

scalar:
  enabled: true
  url: /v3/api-docs
  path: /api-docs

bucket4j:
  enabled: true
  cache-to-use: redis-jedis
  filters:
    # REGRA 1: Auth (Genérica, excluindo /register)
    - cache-name: rate-limit-auth
      filter-method: servlet
      url: ^/auth/(?!register).*
      http-content-type: application/json
      http-response-body: '{ "message": "Muitas requisições. Por favor, aguarde 15 minutos.", "status": 429, "error": "Too Many Requests" }'
      rate-limits:
        - cache-key: "getRemoteAddr()"
          bandwidths:
            - capacity: 5
              time: 15
              unit: minutes

    # REGRA 2: Auth - register
    - cache-name: rate-limit-register
      filter-method: servlet
      url: ^/auth/register.*
      http-content-type: application/json
      http-response-body: '{ "message": "Muitas requisições de registro. Por favor, aguarde 15 minutos.", "status": 429, "error": "Too Many Requests" }'
      rate-limits:
        - cache-key: "getRemoteAddr()"
          bandwidths:
            - capacity: 15
              time: 15
              unit: minutes

    # REGRA 3: CRUD Notas
    - cache-name: rate-limit-notes
      filter-method: servlet
      url: ^/notes.*
      http-content-type: application/json
      http-response-body: '{ "message": "Muitas requisições. Por favor, aguarde 10 minutos.", "status": 429, "error": "Too Many Requests" }'
      rate-limits:
        - cache-key: "getRemoteAddr()"
          bandwidths:
            - capacity: 100
              time: 10
              unit: minutes
