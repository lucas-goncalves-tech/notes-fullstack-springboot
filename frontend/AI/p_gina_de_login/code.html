<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - NotesApp</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13eca4",
                        "background-light": "#f6f8f7",
                        "background-dark": "#10221c",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .checkbox-custom:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox=%270 0 16 16%27 fill=%27%2310221c%27 xmlns=%27http://www.w3.org/2000/svg%27%3e%3cpath d=%27M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z%27/%3e%3c/svg%3e");
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="flex-1 flex flex-col items-center justify-center px-6 py-12">
<div class="w-full max-w-[440px] space-y-8">
<div class="flex flex-col items-center text-center space-y-4">
<div class="bg-primary/20 p-3 rounded-xl">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="description">description</span>
</div>
<div class="space-y-2">
<h1 class="text-3xl font-black tracking-tight text-slate-900 dark:text-slate-100">Welcome back</h1>
<p class="text-slate-500 dark:text-slate-400 text-base">Enter your details to access your notes</p>
</div>
</div>
<div class="bg-white dark:bg-slate-900/50 p-8 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
<form action="#" class="space-y-6" method="POST">
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 placeholder-slate-400 transition-all" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<div>
<div class="flex items-center justify-between mb-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-sm font-medium text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 placeholder-slate-400 transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center">
<input class="checkbox-custom h-5 w-5 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary bg-transparent transition-colors" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-3 block text-sm text-slate-600 dark:text-slate-400" for="remember-me">Remember me for 30 days</label>
</div>
<div>
<button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-background-dark bg-primary hover:brightness-110 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all" type="submit">
                            Sign in to your account
                        </button>
</div>
</form>
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-sm text-slate-600 dark:text-slate-400">
                        Don't have an account? 
                        <a class="font-bold text-primary hover:underline ml-1" href="#">Create an account</a>
</p>
</div>
</div>
<div class="flex justify-center space-x-6 text-xs text-slate-400 dark:text-slate-500">
<a class="hover:text-slate-600 dark:hover:text-slate-300" href="#">Privacy Policy</a>
<a class="hover:text-slate-600 dark:hover:text-slate-300" href="#">Terms of Service</a>
<a class="hover:text-slate-600 dark:hover:text-slate-300" href="#">Support</a>
</div>
</div>
</div>
</body></html>
